agent:
  name: RootCauseAnalyzerAgent
  description: >
    Performs structured root cause analysis for test failures using
    stack traces, logs, and C# code context, and generates a
    GitLab-ready issue description.

  input_schema:
    type: object
    required:
      - exception_type
      - error_message
      - stacktrace
      - step
      - phase
      - code_context
      - context
    properties:
      exception_type:
        type: string
      error_message:
        type: string
      stacktrace:
        type: string
      step:
        type: string
      phase:
        type: string
      code_context:
        type: object
        required: [class, method, code]
        properties:
          class:
            type: string
          method:
            type: string
          code:
            type: string
      context:
        type: object
        required: [file, line]
        properties:
          file:
            type: string
          line:
            type: number

  output_schema:
    type: object
    required:
      - root_cause
      - hypothesis
      - fix_suggestion
      - confidence
      - issue_description
      - issue_fields
    properties:
      root_cause:
        type: string
      hypothesis:
        type: object
        required: [cause, mechanism, trigger]
        properties:
          cause: { type: string }
          mechanism: { type: string }
          trigger: { type: string }
      fix_suggestion:
        type: string
      confidence:
        type: number
      issue_description:
        type: string
      issue_fields:
        type: object
        required: [step, class, method, file, line]
        properties:
          step: { type: string }
          class: { type: string }
          method: { type: string }
          file: { type: string }
          line: { type: number }

workflow:
  steps:

    - id: extract_context
      description: Extract structured failure information
      prompt: |
        Extract structured information from the failure.

        Return JSON with:
        - exception_type
        - method (from stack trace)
        - operation (failing action)
      output_schema:
        type: object
        required: [exception_type, method, operation]
        properties:
          exception_type: { type: string }
          method: { type: string }
          operation: { type: string }

    - id: identify_failure_point
      description: Identify exact failure location
      depends_on: [extract_context]
      prompt: |
        Using the stack trace and code, identify the exact failure point.

        Be precise. Do not generalize.

        Return JSON:
        - failure_point
        - line_hint
      output_schema:
        type: object
        required: [failure_point]
        properties:
          failure_point: { type: string }
          line_hint: { type: number }

    - id: analyze_code
      description: Analyze method behavior
      depends_on: [identify_failure_point]
      prompt: |
        Analyze the provided method.

        Explain:
        - what the method does
        - critical variables
        - potential null or failure points

        Return JSON:
        - summary
        - risk_points (array)
      output_schema:
        type: object
        required: [summary, risk_points]
        properties:
          summary: { type: string }
          risk_points:
            type: array
            items: { type: string }

    - id: correlate_logs
      description: Correlate runtime logs with failure
      depends_on: [analyze_code]
      prompt: |
        Correlate the failure with runtime logs.

        Identify:
        - events before failure
        - evidence supporting failure cause

        Return JSON:
        - evidence (array)
      output_schema:
        type: object
        required: [evidence]
        properties:
          evidence:
            type: array
            items: { type: string }

    - id: validate_hypothesis
      description: Validate root cause hypothesis
      depends_on: [correlate_logs]
      prompt: |
        Validate the hypothesis:

        "The failure is caused by a null reference or invalid object access."

        Check:
        - consistency with code
        - support from logs
        - alternative explanations

        Return JSON:
        - valid (true/false)
        - reasoning
      output_schema:
        type: object
        required: [valid, reasoning]
        properties:
          valid: { type: boolean }
          reasoning: { type: string }

    - id: final_output
      description: Produce final root cause analysis and GitLab issue description
      depends_on: [validate_hypothesis]
      condition: "steps.validate_hypothesis.valid == true"
      prompt: |
        Produce final root cause analysis.

        Additionally, generate a GitLab issue description using EXACT structure below.

        TEMPLATE:

        ## Summary
        Brief explanation of the failure.

        ## Failing Step
        {{step}} ({{phase}} phase)

        ## Root Cause
        {{code_context.class}}.{{code_context.method}}()

        ## Hypothesis
        Cause: ...
        Mechanism: ...
        Trigger: ...

        ## Suggested Fix
        ...

        ## Evidence
        - First occurrence: {{context.file}}:{{context.line}}

        Stack trace:
        {{stacktrace}}

        RULES:
        - Follow section order EXACTLY
        - Do not omit sections
        - Do not add extra sections
        - Be concise and technical
        - Use provided values where applicable

        Return JSON with:
        - root_cause
        - hypothesis
        - fix_suggestion
        - confidence (0–1)
        - issue_description (string)
        - issue_fields (structured fields)

      output_schema:
        type: object
        required:
          - root_cause
          - hypothesis
          - fix_suggestion
          - confidence
          - issue_description
          - issue_fields
        properties:
          root_cause: { type: string }
          hypothesis:
            type: object
            required: [cause, mechanism, trigger]
            properties:
              cause: { type: string }
              mechanism: { type: string }
              trigger: { type: string }
          fix_suggestion: { type: string }
          confidence: { type: number }
          issue_description: { type: string }
          issue_fields:
            type: object
            required: [step, class, method, file, line]
            properties:
              step: { type: string }
              class: { type: string }
              method: { type: string }
              file: { type: string }
              line: { type: number }

  control_flow:
    on_validation_failure:
      step: validate_hypothesis
      if: "valid == false"
      action: retry
      max_retries: 1
      fallback: final_output
